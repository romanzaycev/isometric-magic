[Window]
; Initial game window width in pixels.
Width=1280
; Initial game window height in pixels.
Height=720
; Start in exclusive fullscreen mode when true.
Fullscreen=false

[Engine]
; Frame cap for the main loop.
; 0 = uncapped. The engine still performs a minimal safety yield to prevent a busy loop.
; >0 = soft cap in frames per second.
TargetFPS=0
; Enable vertical synchronization.
; true: presentation is synchronized to display refresh when supported.
; false: no swap-interval sync.
VSync=false

[Graphics]
; Rendering backend.
; opengl = modern GL renderer.
Backend=opengl

[Logging]
; Enable/disable NLog initialization.
Enabled=true
; Date placeholder format used for {date}.
DateFormat=yyyyMMdd_HHmm
; NLog layout shared by all file targets.
Layout=${longdate}|${uppercase:${level}}|${logger}|${message}${onexception:inner= ${exception:format=tostring}}
; Per-target toggles. You can enable any subset independently.
AllEnabled=true
WarnEnabled=true
ErrorEnabled=true
; Path templates support placeholders: {date}, {level}
AllPath=logs/{date}_all.log
WarnPath=logs/{date}_{level}.log
ErrorPath=logs/{date}_{level}.log

[DebugOverlay]
; Master switch for overlay system.
Enabled=true
; Initial visibility at launch. F3 toggles runtime visibility.
EnabledByDefault=false
ToggleKey=F3
FontPath=./resources/engine/vt323-regular.ttf
FontSize=20
RefreshHz=4
PosX=12
PosY=12

[RuntimeEditor]
; Runtime web editor is compiled only in DEBUG builds.
; In Release this section has no effect.
Enabled=true
ToggleKey=F4
Port=5057
OpenBrowser=true
